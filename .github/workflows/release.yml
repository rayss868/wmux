name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    env:
      # NN2-T1 — SignPath Foundation (OSS) code signing. This non-secret gate
      # keeps signing steps no-op until SIGNPATH_API_TOKEN is configured, while
      # avoiding exposure of the token to dependency install/build scripts. To
      # enable after SignPath approval:
      #   1. Add repo SECRET   SIGNPATH_API_TOKEN          (the CI user token)
      #   2. Add repo VARIABLES SIGNPATH_ORGANIZATION_ID,
      #      SIGNPATH_PROJECT_SLUG, SIGNPATH_SIGNING_POLICY_SLUG,
      #      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG (from the SignPath project UI)
      # See docs.signpath.io/trusted-build-systems/github.
      SIGNPATH_ENABLED: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & Make
        run: npm run make

      # ── Authenticode code signing (SignPath Foundation, OSS) ─────────────
      # No-op until SIGNPATH_ENABLED is true (see job env). Signs the prebuilt
      # Setup.exe and replaces the unsigned copy BEFORE the checksum/manifest
      # steps, so the published SHA-256 matches the signed binary. (Signing the
      # embedded app exe + delta .nupkg is the NN2-T2 follow-up.)
      - name: Upload unsigned Setup.exe for signing
        id: upload-unsigned
        if: env.SIGNPATH_ENABLED == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wmux-setup-unsigned
          path: out/make/squirrel.windows/x64/*.Setup.exe
          if-no-files-found: error

      - name: Sign Setup.exe via SignPath
        if: env.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: out/signed

      - name: Replace unsigned Setup.exe with the signed one
        if: env.SIGNPATH_ENABLED == 'true'
        shell: pwsh
        run: |
          $signed = Get-ChildItem "out/signed" -Recurse -Filter "*.Setup.exe" | Select-Object -First 1
          if (-not $signed) { Write-Error "SignPath returned no signed Setup.exe"; exit 1 }
          $dest = Get-ChildItem "out/make/squirrel.windows/x64/*.Setup.exe" | Select-Object -First 1
          Copy-Item $signed.FullName $dest.FullName -Force
          # Verify a signature is actually present. A SELF-SIGNED test certificate
          # (SignPath's test-signing policy) signs correctly but does not chain to a
          # trusted root, so Get-AuthenticodeSignature reports 'UnknownError' rather
          # than 'Valid' — expected for test signing. Require a signer cert in all
          # cases, but only demand a fully 'Valid' chain under the production policy
          # (release-signing), so a test-signed release still publishes.
          $sig = Get-AuthenticodeSignature $dest.FullName
          if (-not $sig.SignerCertificate) { Write-Error "Signed exe carries no signature: $($sig.Status)"; exit 1 }
          if ('${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}' -eq 'release-signing' -and $sig.Status -ne 'Valid') {
            Write-Error "Production signature is not Valid: $($sig.Status)"; exit 1
          }
          Write-Host "Signed Setup.exe in place (status=$($sig.Status), publisher: $($sig.SignerCertificate.Subject))"

      - name: Get version from package.json
        id: pkg
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # Single canonical SHA-256 of the Setup.exe, consumed by BOTH the
      # Chocolatey package (below) and the published update-manifest.json
      # (the in-app updater's integrity pin + install.ps1's verification).
      - name: Compute Setup.exe checksum
        id: checksum
        run: |
          $exe = Get-ChildItem "out/make/squirrel.windows/x64/*Setup.exe" | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # NN2-T3 — publish update-manifest.json so the in-app AutoUpdater (and
      # install.ps1) can pin the Setup.exe SHA-256 before launching it.
      # update.electronjs.org's JSON cannot carry a custom hash field, so this
      # side-car is fetched from the releases/latest/download/ alias.
      - name: Write update manifest
        run: |
          $version  = "${{ steps.pkg.outputs.version }}"
          $sha256   = "${{ steps.checksum.outputs.sha256 }}".ToLower()
          $setupExe = "wmux-$version.Setup.exe"
          $url      = "https://github.com/openwong2kim/wmux/releases/download/v$version/$setupExe"
          $manifest = [ordered]@{
            version  = $version
            setupExe = $setupExe
            sha256   = $sha256
            url      = $url
          }
          $manifest | ConvertTo-Json -Compress | Set-Content -NoNewline -Encoding utf8 "out/make/squirrel.windows/x64/update-manifest.json"
          Write-Host "update-manifest.json: $($manifest | ConvertTo-Json -Compress)"
        shell: pwsh

      # Extract this version's section from CHANGELOG.md as the release body, so
      # release notes are the real changelog (not just the auto PR-title line).
      # generate_release_notes still appends "What's Changed" + the compare link.
      - name: Extract release notes from CHANGELOG
        run: |
          $version = "${{ steps.pkg.outputs.version }}"
          $lines = Get-Content CHANGELOG.md
          $start = -1; $end = $lines.Count
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## \[$([regex]::Escape($version))\]") { $start = $i; continue }
            if ($start -ge 0 -and $lines[$i] -match '^## \[') { $end = $i; break }
          }
          if ($start -lt 0 -or $end -le ($start + 1)) {
            "Release $version. See CHANGELOG.md for details." | Set-Content -Encoding utf8 out/release-notes.md
          } else {
            ($lines[($start + 1)..($end - 1)] -join "`n").Trim() | Set-Content -Encoding utf8 out/release-notes.md
          }
          Write-Host "--- release-notes.md (head) ---"; Get-Content out/release-notes.md | Select-Object -First 6
        shell: pwsh

      # node-pty's Windows prebuilds carry ~27 MB of MSVC debug symbols that
      # forge.config.ts strips from both packaged copies (they are never loaded
      # at runtime — see its isDebugSymbol filter, which promises they "are
      # archived per release tag"). This is that archive: without a copy pinned
      # to the tag, a native conpty/winpty crash dump from a shipped build can
      # never be symbolized. Relative paths are preserved so same-named PDBs
      # from different prebuild dirs don't collide. Non-fatal by design — a
      # symbols failure must not fail a release that otherwise built.
      - name: Archive node-pty debug symbols
        continue-on-error: true
        # The version reaches the script through env rather than direct `${{ }}`
        # interpolation, so a crafted package.json version string is data to
        # PowerShell instead of script text. (The surrounding steps still
        # interpolate directly — pre-existing, out of scope for a release PR.)
        env:
          PKG_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          $version = $env:PKG_VERSION
          $root = "node_modules/node-pty"
          $pdbs = Get-ChildItem -Path $root -Recurse -Filter *.pdb -ErrorAction SilentlyContinue
          if (-not $pdbs) {
            Write-Host "::warning::no node-pty PDBs found under $root — nothing to archive"
            exit 0
          }
          $stage = "out/symbols/stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $rootFull = (Resolve-Path $root).Path
          foreach ($p in $pdbs) {
            $rel = $p.FullName.Substring($rootFull.Length).TrimStart('\', '/')
            $dest = Join-Path $stage $rel
            New-Item -ItemType Directory -Force -Path (Split-Path $dest -Parent) | Out-Null
            Copy-Item $p.FullName $dest
            Write-Host "  + $rel"
          }
          Compress-Archive -Path "$stage/*" -DestinationPath "out/symbols/wmux-symbols-$version.zip" -Force
          Remove-Item -Recurse -Force $stage
          Get-Item "out/symbols/wmux-symbols-$version.zip" | Select-Object Name, Length
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wmux-windows
          path: out/make/**/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/squirrel.windows/x64/RELEASES
            out/make/squirrel.windows/x64/update-manifest.json
            out/symbols/wmux-symbols-*.zip
          body_path: out/release-notes.md
          generate_release_notes: true
          draft: false

      - name: Build Chocolatey package
        run: |
          $version = "${{ steps.pkg.outputs.version }}"
          $sha256  = "${{ steps.checksum.outputs.sha256 }}"
          # Inject version into nuspec
          (Get-Content chocolatey/wmux.nuspec) -replace '\$version\$', $version | Set-Content chocolatey/wmux.nuspec
          # Inject checksum into install script
          (Get-Content chocolatey/tools/chocolateyInstall.ps1) -replace '__CHECKSUM_SHA256__', $sha256 | Set-Content chocolatey/tools/chocolateyInstall.ps1
          choco pack chocolatey/wmux.nuspec --output-directory out/choco
          # Restore originals so git stays clean
          git checkout -- chocolatey/
        shell: pwsh

      - name: Push to Chocolatey
        if: env.CHOCO_API_KEY != ''
        continue-on-error: true
        run: choco push out/choco/wmux.${{ steps.pkg.outputs.version }}.nupkg --source https://push.chocolatey.org --api-key ${{ secrets.CHOCO_API_KEY }}
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}

  winget:
    name: Publish to WinGet
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Publish to winget
        if: env.WINGET_TOKEN != ''
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: openwong2kim.wmux
          version: ${{ needs.build.outputs.version }}
          installers-regex: '\.Setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  # ── macOS build leg ──────────────────────────────────────────────────────
  # OPT-IN: runs only when the repo variable ENABLE_CROSS_PLATFORM_RELEASE is
  # 'true'. Until then this job is skipped and a tag push behaves EXACTLY like
  # today (Windows-only). `needs: build` means it runs AFTER the `build` job has
  # created the GitHub Release, so this job only APPENDS assets to it — it never
  # creates the release. A macOS failure therefore cannot block the Windows
  # release (which already shipped in `build`). Signing/notarization is gated on
  # the Apple secrets being present (same no-op-when-empty contract as SignPath):
  # with no secrets, Forge produces an unsigned/un-notarized .zip/.dmg that still
  # uploads, so the pipeline structure can be validated before certs exist.
  macos:
    name: Build macOS (${{ matrix.os }})
    needs: build
    if: vars.ENABLE_CROSS_PLATFORM_RELEASE == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      # Keep both arches building so one regressing doesn't hide the other.
      fail-fast: false
      matrix:
        # macos-14 = Apple Silicon (arm64). macos-13 (Intel/x64) was dropped: the
        # hosted runner cancels the job within ~1s on this repo, which only ever
        # showed up as a spurious red leg. Re-add when an Intel build is needed.
        os: [macos-14]
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Import the Developer ID Application cert into a throwaway keychain so
      # Forge's osxSign can discover it. No-op when the cert secret is empty.
      - name: Import Apple Developer ID certificate
        if: env.APPLE_CERT_P12_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/wmux-build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      # Forge signs + notarizes inside `make` only when Apple creds are present
      # (see macSignConfig in forge.config.ts); otherwise it builds unsigned.
      - name: Build & Make
        run: npm run make
        timeout-minutes: 30

      # Append the .zip/.dmg to the release the `build` job already created.
      # continue-on-error: a macOS upload hiccup must not fail the whole release.
      - name: Upload macOS artifacts to the release
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FILES=$(find out/make -type f \( -name '*.dmg' -o -name '*.zip' \))
          if [ -z "$FILES" ]; then echo "No macOS artifacts found — skipping upload"; exit 0; fi
          printf 'Uploading:\n%s\n' "$FILES"
          # Filenames carry no spaces (wmux-<ver>-<arch>.dmg); intentional word split.
          # shellcheck disable=SC2086
          gh release upload "$RELEASE_TAG" $FILES --clobber

      - name: Clean up temporary keychain
        if: always() && env.APPLE_CERT_P12_BASE64 != ''
        shell: bash
        run: security delete-keychain "$RUNNER_TEMP/wmux-build.keychain-db" || true

  # ── Linux build leg ──────────────────────────────────────────────────────
  # OPT-IN (same flag) + needs: build → append-only, never blocks Windows.
  # Linux has no in-app auto-update (users update via apt/dnf or re-download the
  # AppImage), so no manifest is published here.
  linux:
    name: Build Linux
    needs: build
    if: vars.ENABLE_CROSS_PLATFORM_RELEASE == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      # build-essential + libxss1 for node-pty/Electron (matches the baseline CI);
      # rpm + fakeroot are required by @electron-forge/maker-rpm.
      #
      # Everything above comes from the Ubuntu archives, but `apt-get update`
      # fails hard on ANY configured repo, and GitHub's images preconfigure
      # third-party ones nothing here installs from. When the Microsoft prod repo
      # 403'd on 2026-07-17 update exited 100 and killed the baseline job; on THIS
      # path the cost is higher — the .deb, .rpm and .AppImage would go missing
      # from a release over a repo we don't use. Dropped by content rather than
      # filename (the same host spans microsoft-prod.list, azure-cli.list, …, and
      # matching the host keeps a future deb822 runner's ubuntu.sources intact).
      - name: Install Linux build dependencies
        run: |
          sudo bash -c 'grep -rlE "packages\.microsoft\.com|dl\.google\.com" /etc/apt/sources.list.d/ 2>/dev/null | xargs -r rm -f'
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get install -y build-essential libxss1 rpm fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Build & Make
        run: npm run make
        timeout-minutes: 30

      - name: Upload Linux artifacts to the release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FILES=$(find out/make -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \))
          if [ -z "$FILES" ]; then echo "No Linux artifacts found — skipping upload"; exit 0; fi
          printf 'Uploading:\n%s\n' "$FILES"
          # shellcheck disable=SC2086
          gh release upload "$RELEASE_TAG" $FILES --clobber
