name: CI Cross-Platform Baseline

# Baseline workflow exercising the unix branches of the codebase that have
# never been run in CI. Result is informational — this is NOT a release gate
# and no other workflow should `needs:` it. First runs are expected to fail
# on macOS/Linux (45 known `process.platform === 'win32'` branches, of which
# the unix sides have never been executed). Failures get triaged via the
# cross-platform fix budget, not by blocking merges.

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'feat/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  baseline:
    name: Baseline (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Per DX/Eng review T1 (per-OS independent publish policy): keep all
      # matrix legs running so we can see the full cross-platform picture
      # even if one OS regresses.
      fail-fast: false
      matrix:
        os:
          - windows-latest   # regression baseline (the only OS that works today)
          - macos-14         # Apple Silicon
          - ubuntu-22.04     # Linux baseline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # node-pty builds from source on Linux (no prebuilt for Electron's ABI).
      # build-essential pulls in gcc/g++/make; libxss1 is required by Electron
      # at runtime/link-time on headless Linux runners.
      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libxss1

      # macos-14 (Apple Silicon) ships with Xcode Command Line Tools preinstalled.
      # We only verify presence — do NOT attempt to install, that would burn
      # ~10 minutes and is unnecessary on GitHub-hosted runners.
      - name: Verify macOS Xcode CLT
        if: runner.os == 'macOS'
        run: |
          xcode-select -p
          clang --version
          make --version | head -n 1

      # postinstall runs scripts/fix-node-pty.js, which now early-exits on
      # non-Windows platforms (process.platform !== 'win32' guard, v2.7.3+).
      - name: Install dependencies (cross-platform)
        run: npm ci

      - name: Typecheck (cross-platform)
        run: npx tsc --noEmit -p tsconfig.json

      # ESLint runs informationally — the codebase has ~124 pre-existing
      # baseline errors (mostly require() statements and empty-catch blocks)
      # that we are intentionally NOT cleaning up as part of the cross-
      # platform port. Continuing past lint failures lets us see the
      # downstream Vitest results, which are the actual signal we care about.
      - name: ESLint (cross-platform, informational)
        run: npx eslint --ext .ts,.tsx .
        continue-on-error: true

      # Strict lint on files added/modified by the cross-platform port. Any
      # new error here is a real regression introduced by porting work.
      # NOTE: keep this on ONE line. PowerShell on windows-latest does not
      # honor bash `\` line continuations, which made eslint receive zero
      # arguments and walk up the directory tree until it found a stray
      # .eslintrc.json inside the actions/checkout install dir.
      - name: ESLint (new cross-platform code, strict)
        run: npx eslint --max-warnings=0 src/shared/platform.ts src/shared/__tests__/platform.test.ts src/shared/ShellDetector.ts src/shared/__tests__/ShellDetector.test.ts src/shared/shellResolution.ts src/shared/__tests__/shellResolution.test.ts src/main/notification/__tests__/ToastManager.test.ts

      - name: Test (cross-platform)
        run: npm test
